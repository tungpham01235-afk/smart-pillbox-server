<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pillbox - Mất kết nối</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 48px;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(129, 140, 248, 0); }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .cached-note {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.85rem;
            color: #6ee7b7;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #818cf8, #4f46e5);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            width: 100%;
            justify-content: center;
            margin-bottom: 12px;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.5);
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 28px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            width: 100%;
            justify-content: center;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 1.5s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrapper">📶</div>
        
        <h1>Mất kết nối mạng</h1>
        <p>
            <span class="status-dot"></span>
            Smart Pillbox đang ngoại tuyến. Vui lòng kiểm tra kết nối WiFi hoặc dữ liệu di động của bạn.
        </p>

        <div class="cached-note">
            ✅ Dữ liệu cấu hình thuốc đã được lưu cục bộ.<br>
            Thiết bị tủ thuốc vẫn hoạt động độc lập theo lịch đã thiết lập.
        </div>

        <button class="btn-retry" onclick="retryConnection()">
            🔄 Thử lại kết nối
        </button>
        <a class="btn-home" href="/">
            🏠 Về trang chủ
        </a>

        <p class="footer-note">Smart Pillbox v2.0 · PWA Mode</p>
    </div>

    <script>
        function retryConnection() {
            const btn = document.querySelector('.btn-retry');
            btn.innerText = '⏳ Đang kiểm tra...';
            btn.disabled = true;
            
            // Kiểm tra kết nối bằng cách ping server
            fetch('/manifest.json', { cache: 'no-store' })
                .then(() => {
                    // Có kết nối, quay lại trang trước
                    btn.innerText = '✅ Đã kết nối! Đang tải lại...';
                    setTimeout(() => {
                        window.history.back();
                        // Fallback nếu không có trang trước
                        setTimeout(() => { window.location.href = '/'; }, 500);
                    }, 800);
                })
                .catch(() => {
                    btn.innerText = '❌ Vẫn mất kết nối';
                    btn.disabled = false;
                    setTimeout(() => {
                        btn.innerText = '🔄 Thử lại kết nối';
                    }, 2500);
                });
        }

        // Tự động thử kết nối mỗi 15 giây
        setInterval(() => {
            fetch('/manifest.json', { cache: 'no-store' })
                .then(() => {
                    window.history.back();
                    setTimeout(() => { window.location.href = '/'; }, 300);
                })
                .catch(() => {});
        }, 15000);

        // Lắng nghe sự kiện online
        window.addEventListener('online', () => {
            setTimeout(() => {
                window.history.back();
                setTimeout(() => { window.location.href = '/'; }, 300);
            }, 500);
        });
    </script>
</body>
</html>
