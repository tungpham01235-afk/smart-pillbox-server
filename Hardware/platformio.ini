; ═══════════════════════════════════════════════════════════
; TỦ THUỐC THÔNG MINH (Smart Pillbox) — PlatformIO Config
; Platform: ESP32 | Framework: Arduino | FileSystem: LittleFS
; ═══════════════════════════════════════════════════════════

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

lib_deps =
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    bblanchon/ArduinoJson@^6
    arduino-libraries/NTPClient@^3
